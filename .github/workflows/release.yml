name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Build binaries
        run: |
          mkdir -p release
          npm run pkg:linux
          npm run pkg:linux-arm
          npm run pkg:win
          # Generate checksums
          cd release
          sha256sum devcontrol-linux-x64 devcontrol-linux-arm64 devcontrol-win-x64.exe > checksums.sha256
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SP-DevControl ${{ github.ref_name }}
          body: |
            ## SP-DevControl ${{ github.ref_name }}

            Local governance layer for AI-assisted development.

            ### Install

            ```bash
            npm install -g sp-devcontrol
            ```

            Or download a standalone binary below (no Node.js required).

            ### What's new
            See [CHANGELOG.md](https://github.com/PRojas01/sp-devcontrol/blob/master/CHANGELOG.md)
          draft: false
          prerelease: false
          files: |
            release/devcontrol-linux-x64
            release/devcontrol-linux-arm64
            release/devcontrol-win-x64.exe
            release/checksums.sha256

      - name: Publish to npm
        continue-on-error: true
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
